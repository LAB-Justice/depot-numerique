pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{js,jsx,ts,tsx,json,jsonc,css,scss,md,yml,yaml}"
      run: pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}

pre-push:
  parallel: true
  jobs:
    - name: check
      run: pnpm check

    - name: knip
      run: pnpm knip

    - name: typecheck
      run: pnpm typecheck

    - name: test
      run: pnpm test
