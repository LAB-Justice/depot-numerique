@if (session.isAuthenticated()) {
<div class="flex min-h-dvh flex-col">
  <app-header />
  @if (contextLabel(); as ctx) {
  <div class="bg-white">
    <div class="mx-auto max-w-6xl px-4 py-3">
      <p class="text-xs text-tx-muted">
        <span class="font-medium text-tx">Contexte agent</span>
        (détecté depuis le SSO, non modifiable) — {{ ctx }}
      </p>
    </div>
  </div>
  }

  <main class="mx-auto w-full max-w-6xl flex-1 px-4 py-8">
    <router-outlet />
  </main>

  <app-footer />
</div>
} @else {
<main class="min-h-dvh w-full">
  <router-outlet />
</main>
}
