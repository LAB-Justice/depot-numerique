<header class="border-b border-grey bg-white shadow-sm">
  <!-- Bandeau Marianne -->
  <div class="bg-bf text-white">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-1.5 text-xs">
      <div class="flex items-center gap-2">
        <span class="font-bold"
          >République
          <span class="opacity-80">Française</span></span
        >
      </div>
      @if (session.profile(); as profile) {
      <div class="flex items-center gap-3">
        <span class="hidden sm:inline opacity-90">{{ profile.displayName }}</span>
        <span class="rounded bg-white/15 px-2 py-0.5 font-semibold"
          >{{ profile.jurisdictionCode }}</span
        >
        <button
          type="button"
          class="rounded px-2 py-0.5 transition-colors hover:bg-white/20"
          (click)="logout()"
        >
          Déconnexion
        </button>
      </div>
      }
    </div>
  </div>

  <!-- Navigation -->
  <div
    class="mx-auto flex max-w-6xl flex-col gap-3 px-4 py-4 sm:flex-row sm:items-center sm:justify-between"
  >
    <a routerLink="/deposit" class="flex items-center gap-3">
      <span class="flex size-9 items-center justify-center rounded bg-rm font-black text-white"
        >RF</span
      >
      <span>
        <span class="block text-base font-bold leading-tight text-tx">Dépôt Numérique</span>
        <span class="block text-xs text-tx-muted">Transmission vers IMPRIMFIP</span>
      </span>
    </a>
    @if (session.isAuthenticated()) {
    <nav class="flex items-center gap-1">
      <a
        routerLink="/deposit"
        routerLinkActive="bg-bf-925 text-bf"
        [routerLinkActiveOptions]="{ exact: true }"
        class="rounded px-3 py-1.5 text-sm font-medium text-tx-muted transition-colors hover:bg-grey-light hover:text-tx"
      >
        Dépôt
      </a>
      <a
        routerLink="/history"
        routerLinkActive="bg-bf-925 text-bf"
        class="rounded px-3 py-1.5 text-sm font-medium text-tx-muted transition-colors hover:bg-grey-light hover:text-tx"
      >
        Historique
      </a>
    </nav>
    }
  </div>
</header>
